<!DOCTYPE html>
<html lang="en-GB">
<head>
  <title>Radio Test</title>
  <!--metadata-->
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <!--load files-->
  <link rel="icon" href="../favicon.ico" type="image/x-icon"/> 
  <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon"/>
  <link rel="stylesheet" href="../style.css"/>
<body>
  <video src="../resources/gif/EternalTorture.webm" autoplay loop muted playsinline id="videoBG"></video>
  <nav>
    <div><a href="../index.html">Back</a></div>
  </nav>
  <main>
    <div class="pageTitle">Radio Test</div>
    <div class="horizontalLine"></div><br/>
    

    <noscript>
      <audio src="http://media-ice.musicradio.com/ClassicFMMP3" controls></audio>
      <style>.playAudio{display: none}</style>
    </noscript>
    <audio id="audio" src="../resources/music/webradio/loading playlist.mp3" preload="auto"></audio>
    <button class="playAudio" onclick="playAudio()">Start BGM</button>
    <script type="text/javascript" src="../scripts/audioPlayer.js" defer></script>
    <div id="audioStatus" class="hidden" data-playlist="webradios.txt">
      <span id="BGMName">Music</span></br>
      <button style="vertical-align: middle"><img src="" id="playIcon"></button>
      <span id="audioProgressBar"></span>
      &nbsp;<span id="currentTime" class="time">0:00</span> / <span id="totalTime" class="time">0:00</span>
      <p id="playlistText" class="hidden"></p>
    </div>

    <p>Test web radios by pressing <code>Start BGM</code> or <code>Space</code></p>
    
  </main>
</body>
</html>
